services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sabkaplacement-frontend
    ports:
      - "9021:9021"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_APP_NAME=${VITE_APP_NAME}
    restart: unless-stopped
    networks:
      - sabkaplacement-network

networks:
  sabkaplacement-network:
    driver: bridge
